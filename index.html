<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f8ef7;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #3a7ae0;
    }

    .input-row button:disabled {
      background: #a0bff8;
      cursor: not-allowed;
    }

    .summary {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f9f9f9;
    }

    li + li {
      border-top: 1px solid #f0f0f0;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f8ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1a1a1a;
      word-break: break-all;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    li .delete-btn:hover {
      color: #e74c3c;
      background: #fff0ee;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.9rem;
    }

    .loading {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요" />
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <p class="summary" id="summary"></p>
    <ul id="list"></ul>
    <p class="loading" id="loading">불러오는 중...</p>
    <p class="empty" id="empty" style="display:none">아직 아이템이 없어요</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://cquffsmunlnavzbppmaj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxdWZmc211bmxuYXZ6YnBwbWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzODc0MDQsImV4cCI6MjA5Mzk2MzQwNH0.C2WFOjRVpB3PPD6kDzc1djbu_8Aa_IgMK4RLAALDWjg';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      document.getElementById('loading').style.display = 'none';

      if (error) {
        console.error('불러오기 실패:', error.message);
        return;
      }

      items = data;
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const summary = document.getElementById('summary');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        summary.textContent = '';
        return;
      }

      empty.style.display = 'none';
      const checked = items.filter(i => i.checked).length;
      summary.textContent = `${checked} / ${items.length} 완료`;

      items.forEach((item) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.checked;
        checkbox.onchange = () => toggleItem(item.id);

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '✕';
        delBtn.onclick = () => deleteItem(item.id);

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const addBtn = document.getElementById('addBtn');
      const text = input.value.trim();
      if (!text) return;

      addBtn.disabled = true;

      const { error } = await db
        .from('shopping_items')
        .insert({ text, checked: false });

      addBtn.disabled = false;

      if (error) {
        console.error('추가 실패:', error.message);
        return;
      }

      input.value = '';
      input.focus();
      await loadItems();
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      const { error } = await db
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);

      if (error) {
        console.error('수정 실패:', error.message);
        return;
      }

      await loadItems();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        console.error('삭제 실패:', error.message);
        return;
      }

      await loadItems();
    }

    document.getElementById('itemInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
